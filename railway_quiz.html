<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄道 路線・駅名 穴埋めクイズ</title>
    <style>
        :root {
            --primary-color: #d35400; /* デフォルト（近鉄オレンジ）。JSで動的に変更されます */
            --secondary-color: #2c3e50;
            --bg-color: #f4f7f6;
            --box-bg: #ffffff;
            --line-color: #34495e;
            
            /* 各社カラー定義 */
            --color-kintetsu: #f9b500;
            --color-hanshin: #004b87;
            --color-hankyu: #630000;
            --color-keihan: #007b43;
            --color-nankai: #ffd700;
            --color-hankai: #ff8c00;
            --color-osakametro: #001c6a; /* Osaka Metro Blue */
        }
        
        html {
            scrollbar-gutter: stable;
        }

        /* --- スクロールバーのスタイル --- */
        body::-webkit-scrollbar { width: 10px; }
        body::-webkit-scrollbar-track { background: transparent; }
        body::-webkit-scrollbar-thumb {
            background-color: transparent;
            border-radius: 5px;
            transition: background-color 0.3s ease-in-out;
        }
        body.scrolling::-webkit-scrollbar-thumb { background-color: rgba(44, 62, 80, 0.5); }
        body::-webkit-scrollbar-thumb:hover { background-color: rgba(44, 62, 80, 0.7); }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            max-width: 650px;
            margin: 0 auto;
            /* ホーム画面固定のため padding はラッパーに移動 */
        }

        /* --- ホーム画面固定用クラス --- */
        body.fixed-home {
            overflow: hidden; /* スクロールを禁止 */
        }

        /* ==========================================
           ホーム画面（会社選択）用スタイル
        ========================================== */
        #home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; /* 古いブラウザ用 */
            height: 100dvh; /* スマホのアドレスバーを考慮した高さ */
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        #home-screen h1 {
            color: var(--secondary-color);
            /* 画面高さに応じて文字を少し縮小させる */
            font-size: clamp(1.4em, 4vh, 1.8em);
            margin: 10px 0 10px 0;
            flex-shrink: 0; /* タイトルは潰さない */
            line-height: 1.3;
　　　       position: relative; 
　          top: 200px;
        }

        .company-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            flex-grow: 1; /* 残りの高さをすべて使う */
            padding-bottom: 10px;
        }

        .company-card {
            width: 100%;
            max-width: 350px;
            flex: 1; /* 高さを均等に分ける */
            min-height: 40px; /* 縮みすぎ防止 */
            max-height: 65px; /* 大きくなりすぎ防止 */
            font-size: clamp(1.1em, 3vh, 1.4em); /* 高さに応じて文字も縮小 */
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 10px;
        }

        .company-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .card-kintetsu { background-color: var(--color-kintetsu); }
        .card-hanshin { background-color: var(--color-hanshin); }
        .card-hankyu { background-color: var(--color-hankyu); }
        .card-keihan { background-color: var(--color-keihan); }
        .card-nankai { background-color: var(--color-nankai); }
        .card-hankai { background-color: var(--color-hankai); }
        .card-osakametro { background-color: var(--color-osakametro); }

        /* ==========================================
           クイズ画面用スタイル
        ========================================== */
        #quiz-screen {
            display: none; /* 初期状態では非表示 */
            padding: 20px;
            box-sizing: border-box;
        }

        /* ヘッダー周り（戻るボタン含む） */
        .header-container {
            position: relative;
            margin-bottom: 20px;
            text-align: center;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--secondary-color);
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background-color: #e2e8f0;
        }

        h1#main-title {
            color: var(--primary-color);
            margin: 0;
            font-size: 1.6em;
        }

        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #ccc;
        }

        .tab-btn {
            padding: 12px 25px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            background: none;
            font-size: 1.1em;
            color: #888;
            border-bottom: 4px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 4px solid var(--primary-color);
        }

        .tab-btn:hover {
            color: var(--primary-color);
        }

        .description {
            text-align: center;
            font-size: 0.9em;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .quiz-item {
            background-color: var(--box-bg);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 5px solid var(--secondary-color);
        }

        .hint {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1em;
            color: var(--secondary-color);
        }

        .input-area {
            display: flex;
            align-items: center;
            font-size: 1.2em;
        }

        .station-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        select {
            padding: 8px 12px;
            font-size: 1em;
            border-radius: 6px;
            border: 2px solid var(--primary-color);
            outline: none;
            background-color: white;
            font-weight: bold;
            max-width: 100%;
        }

        .setting-group {
            display: flex;
            align-items: center;
            background-color: white;
            padding: 6px 10px;
            border-radius: 6px;
            border: 2px solid #ccc;
        }

        .setting-group label {
            font-weight: bold;
            color: #555;
            margin-right: 5px;
            font-size: 0.9em;
        }

        .setting-group input[type="number"] {
            border: none;
            outline: none;
            font-size: 1.1em;
            width: 50px;
            font-weight: bold;
            color: var(--primary-color);
            text-align: right;
        }

        .setting-group span {
            color: #888;
            margin-left: 3px;
            font-size: 0.9em;
        }

        .btn-stack {
            position: relative;
            width: 120px;
            height: 38px;
        }

        .regen-btn, .reset-st-btn {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 1em;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .regen-btn:hover, .reset-st-btn:hover { opacity: 0.8; }
        .reset-st-btn { display: none; }

        #station-list-container, #st-ans-controls { display: none; }

        .station-list {
            list-style: none;
            padding: 0;
            margin: 20px 10px 20px 25px;
            border-left: 4px solid var(--line-color);
        }

        .station-item {
            position: relative;
            padding-left: 20px;
            margin-bottom: 15px;
            min-height: 35px;
            display: flex;
            align-items: center;
        }

        .station-item::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background-color: white;
            border: 3px solid var(--line-color);
            border-radius: 50%;
        }

        .station-name {
            font-size: 1.1em;
            font-weight: bold;
        }

        .st-input-wrapper {
            display: flex;
            flex-direction: column;
        }

        input[type="text"] {
            font-size: 1em;
            padding: 6px 10px;
            width: 140px;
            border: 2px solid #ccc;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus { border-color: var(--primary-color); }
        input.correct { background-color: #d4edda; border-color: #28a745; color: #155724; }
        input.incorrect { background-color: #f8d7da; border-color: #dc3545; color: #721c24; }

        .correct-answer {
            display: none;
            color: #dc3545;
            font-size: 0.85em;
            margin-top: 5px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .action-btn {
            font-size: 1.1em;
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            background-color: var(--primary-color);
            transition: opacity 0.2s;
        }

        .action-btn:hover { opacity: 0.8; }
        .reset-btn { background-color: #95a5a6; }

        .result-display {
            text-align: center;
            font-size: 1.4em;
            font-weight: bold;
            margin-top: 20px;
            color: var(--secondary-color);
            min-height: 30px;
            padding-bottom: 30px;
        }

        /* レスポンシブ対応 */
        @media (max-width: 480px) {
            .header-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            .back-btn {
                position: static;
                transform: none;
                align-self: flex-start;
            }
        }
    </style>
</head>
<body class="fixed-home">

    <!-- ==========================================
         ホーム画面（初期表示・スクロール固定）
    ========================================== -->
    <div id="home-screen">
        <h1><br>挑戦する鉄道会社を<br>選んでください</h1>

            <button class="company-card card-hanshin" onclick="selectCompany('hanshin')">阪神電気鉄道</button>
            <button class="company-card card-hankyu" onclick="selectCompany('hankyu')">阪急電鉄</button>
            <button class="company-card card-keihan" onclick="selectCompany('keihan')">京阪電気鉄道</button>
            <button class="company-card card-nankai" onclick="selectCompany('nankai')">南海電気鉄道</button>
            <button class="company-card card-hankai" onclick="selectCompany('hankai')">阪堺電気軌道</button>
        </div>
    </div>

    <!-- ==========================================
         クイズ画面
    ========================================== -->
    <div id="quiz-screen">

            <h1 id="main-title">穴埋めクイズ</h1>
        </div>

        <!-- タブメニュー -->
        <div class="tabs">
            <button class="tab-btn active" id="btn-route" onclick="switchTab('route')">路線名を当てる</button>
            <button class="tab-btn" id="btn-station" onclick="switchTab('station')">駅名を当てる</button>
        </div>

        <!-- 路線名当てタブ -->
        <div id="tab-route">
            <p class="description">起終点や特徴的な区間をヒントに、路線の名前を入力してください。<br>（例: 「奈良」 ※「線」は不要です）</p>
            
            <div id="route-container"></div>

            <div class="controls">
                <button class="action-btn" onclick="checkRouteAnswers()">答え合わせ</button>
                <button class="action-btn reset-btn" onclick="resetRouteQuiz()">リセット</button>
            </div>
            <div id="route-result" class="result-display"></div>
        </div>

        <!-- 駅名当てタブ -->
        <div id="tab-station" style="display: none;">
            <p class="description">
                設定を決めて「問題を作成」を押すと路線図が表示されます。<br>
                空欄の駅名を入力してください。<span style="font-weight:bold;">（※公式がひらがなの駅はひらがなで入力）</span><br>
                <span style="color:var(--primary-color);">※「近鉄」「阪神」「京阪」などの会社名は省略可能です</span>
            </p>

            <div class="station-controls" id="st-controls">
                <!-- JSで動的に書き換えます -->
                <select id="line-select" onchange="onLineChange()"></select>
                
                <div class="setting-group">
                    <label for="blank-count">空白:</label>
                    <input type="number" id="blank-count" min="1" value="5">
                    <span id="max-station-display">/ 0 駅</span>
                </div>

                <div class="btn-stack">
                    <button class="regen-btn" id="btn-create-st" onclick="generateStationQuiz(true)">問題を作成</button>
                    <button class="reset-st-btn" id="btn-reset-st" onclick="resetStationUI()">リセット</button>
                </div>
            </div>

            <ul class="station-list" id="station-list-container"></ul>

            <div class="controls" id="st-ans-controls">
                <button class="action-btn" onclick="checkStationAnswers()">答え合わせ</button>
            </div>
            <div id="station-result" class="result-display"></div>
        </div>

    </div>

        function switchTab(tabName) {
            document.getElementById('tab-route').style.display = (tabName === 'route') ? 'block' : 'none';
            document.getElementById('tab-station').style.display = (tabName === 'station') ? 'block' : 'none';

            document.getElementById('btn-station').classList.toggle('active', tabName === 'station');

        // ==========================================
        // 路線名当てクイズ ロジック
        // ==========================================
        function initRouteQuiz() {
            const container = document.getElementById('route-container');
            container.innerHTML = '';
            
            routeData.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'quiz-item';
                div.innerHTML = `
                    <div class="hint">Q${index + 1}. ${q.hint}</div>
                    <div class="input-area">
                        <input type="text" id="route-input-${q.id}" placeholder="路線名" autocomplete="off">
                        <span style="font-weight:bold; color:#555; margin-left:5px;">線</span>
                    </div>
                    <div class="correct-answer" id="route-ans-${q.id}">正解: ${q.answer}線</div>
                `;
                container.appendChild(div);
            });
        }

        function checkRouteAnswers() {
            let score = 0;
            routeData.forEach(q => {
                const input = document.getElementById(`route-input-${q.id}`);
                const ans = document.getElementById(`route-ans-${q.id}`);
                let val = input.value.trim().replace(/線$/, "");

                input.classList.remove('correct', 'incorrect');
                if (val === q.answer) {
                    input.classList.add('correct');
                    ans.style.display = 'none';
                    score++;
                } else {
                    input.classList.add('incorrect');
                    ans.style.display = 'block';
                }
            });

            const res = document.getElementById('route-result');
            res.innerHTML = `正解数: <span style="color:var(--primary-color);">${score}</span> / ${routeData.length} 問`;
            if (score === routeData.length) res.innerHTML += "<br>🎉 全問正解！";
        }

        function resetRouteQuiz() {
            routeData.forEach(q => {
                const input = document.getElementById(`route-input-${q.id}`);
                if(input) {
                    input.value = '';
                    input.classList.remove('correct', 'incorrect');
                    document.getElementById(`route-ans-${q.id}`).style.display = 'none';
                }
            });
            document.getElementById('route-result').innerHTML = '';
        }

        // ==========================================
        // 駅名当てクイズ ロジック
        // ==========================================
        let currentStationQuiz = [];
        let isStationQuizStarted = false;

        function resetStationUI() {
            isStationQuizStarted = false;
            document.getElementById('station-list-container').style.display = 'none';
            document.getElementById('st-ans-controls').style.display = 'none';
            
            document.getElementById('btn-reset-st').style.display = 'none';
            document.getElementById('btn-create-st').style.display = 'flex';
            
            document.getElementById('station-result').innerHTML = '';
        }

        function onLineChange() {
            const lineKey = document.getElementById('line-select').value;
            // 路線がまだセットされていない場合は処理を抜ける
            if(!lineKey || !stationData[lineKey]) return;

            const stations = stationData[lineKey];
            const maxStations = stations.length;
            
            const countInput = document.getElementById('blank-count');
            const maxDisplay = document.getElementById('max-station-display');
            
            countInput.max = maxStations;
            maxDisplay.textContent = `/ ${maxStations} 駅`;

            if (parseInt(countInput.value) > maxStations) {
                countInput.value = maxStations;
            }

            if (isStationQuizStarted) {
                generateStationQuiz(false);
            }
        }

        function generateStationQuiz(forceStart = false) {
            if (forceStart && !isStationQuizStarted) {
                isStationQuizStarted = true;
                document.getElementById('station-list-container').style.display = 'block';
                document.getElementById('st-ans-controls').style.display = 'flex';
                
                document.getElementById('btn-create-st').style.display = 'none';
                document.getElementById('btn-reset-st').style.display = 'flex';
            } else if (!isStationQuizStarted) {
                return;
            }

            const lineKey = document.getElementById('line-select').value;
            const stations = stationData[lineKey];
            const container = document.getElementById('station-list-container');
            
            let blankCount = parseInt(document.getElementById('blank-count').value);
            if (isNaN(blankCount) || blankCount < 0) blankCount = 1;
            if (blankCount > stations.length) blankCount = stations.length;

            let indices = Array.from({length: stations.length}, (_, i) => i);
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            const blankIndices = new Set(indices.slice(0, blankCount));

            container.innerHTML = '';
            currentStationQuiz = [];
            document.getElementById('station-result').innerHTML = '';

            stations.forEach((station, index) => {
                const isBlank = blankIndices.has(index);
                currentStationQuiz.push({ id: index, name: station, isBlank: isBlank });

                const li = document.createElement('li');
                li.className = 'station-item';

                if (isBlank) {
                    li.innerHTML = `
                        <div class="st-input-wrapper">
                            <input type="text" id="st-input-${index}" placeholder="駅名を入力" autocomplete="off">
                            <div class="correct-answer" id="st-ans-${index}">正解: ${station}</div>
                        </div>
                    `;
                } else {
                    li.innerHTML = `<span class="station-name">${station}</span>`;
                }
                container.appendChild(li);
            });
        }

        function checkStationAnswers() {
            let score = 0;
            let blankCount = 0;

            currentStationQuiz.forEach(st => {
                if (st.isBlank) {
                    blankCount++;
                    const input = document.getElementById(`st-input-${st.id}`);
                    const ans = document.getElementById(`st-ans-${st.id}`);
                    
                    let userVal = input.value.trim().replace(/駅$/, "");
                    
                    // 全社の社名接頭辞を無視して正解判定できるようにする
                    let cleanUserVal = userVal.replace(/^(近鉄|阪神|阪急|京阪|南海|阪堺|大阪メトロ|Osaka Metro|osaka metro)/i, "");
                    let cleanCorrect = st.name.replace(/^(近鉄|阪神|阪急|京阪|南海|阪堺|大阪メトロ|Osaka Metro|osaka metro)/i, "");

                    input.classList.remove('correct', 'incorrect');
                    
                    if (cleanUserVal === cleanCorrect && cleanUserVal !== "") {
                        input.classList.add('correct');
                        ans.style.display = 'none';
                        score++;
                    } else {
                        input.classList.add('incorrect');
                        ans.style.display = 'block';
                    }
                }
            });

            const res = document.getElementById('station-result');
            if (blankCount > 0) {
                res.innerHTML = `正解数: <span style="color:var(--primary-color);">${score}</span> / ${blankCount} 問`;
                if (score === blankCount) res.innerHTML += "<br>🎉 全問正解！素晴らしい！";
            } else {
                res.innerHTML = "空欄が0個です。空白の数を増やしてください。";
            }
        }
        
        // ==========================================
        // スクロールバー表示制御 (PC Chrome向け)
        // ==========================================
        let scrollTimer;
        window.addEventListener('scroll', function() {
            // 固定画面中は発火させない
            if(document.body.classList.contains('fixed-home')) return;

            document.body.classList.add('scrolling');
            clearTimeout(scrollTimer);
            scrollTimer = setTimeout(function() {
                document.body.classList.remove('scrolling');
            }, 1500);
        }, { passive: true });

    </script>

</body>
</html>
