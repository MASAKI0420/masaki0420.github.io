
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ロゴ有無切り替えQR</title>
    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.5.0/dist/easy.qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: #333;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 { margin: 0 0 25px 0; font-size: 1.3rem; color: #444; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.95rem;}

        input[type="text"] {
            width: 100%; padding: 14px; border: 2px solid #e0e0e0;
            border-radius: 12px; box-sizing: border-box; font-size: 16px;
            outline: none; transition: border 0.3s;
        }
        input[type="text"]:focus { border-color: #06c755; }

        /* 切り替えボタンのスタイル */
        .toggle-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .toggle-label {
            cursor: pointer;
            padding: 10px 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #666;
            background: #fafafa;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        /* ラジオボタン自体は隠す */
        .toggle-label input { display: none; }
        
        /* 選択されている時のスタイル */
        .toggle-label:has(input:checked) {
            border-color: #06c755;
            background-color: #e6fffa;
            color: #06c755;
        }
        /* Safariなど古いブラウザ対応のための予備CSS */
        .toggle-label.active {
            border-color: #06c755;
            background-color: #e6fffa;
            color: #06c755;
        }

        button {
            background-color: #06c755;
            color: white; border: none; padding: 16px;
            font-size: 16px; border-radius: 12px; cursor: pointer;
            width: 100%; font-weight: bold;
            box-shadow: 0 4px 10px rgba(6, 199, 85, 0.2);
            transition: opacity 0.2s;
        }
        button:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none;}
        button:active { opacity: 0.8; }

        #status-bar {
            margin: 15px 0; padding: 10px; font-size: 0.9rem;
            border-radius: 8px; display: none;
        }
        .status-ok { background-color: #e6fffa; color: #047857; }
        .status-error { background-color: #ffe6e6; color: #cc0000; }

        #qrcode-display {
            margin-top: 25px;
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fafafa;
            border: 2px dashed #eee;
            border-radius: 10px;
            padding: 10px;
        }
        
        #qrcode-img {
            max-width: 100%;
            height: auto;
            border-radius: 0px; /* 直角 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>QRコード作成</h1>
        
        <div class="input-group">
            <label class="input-label">URLを入力してください</label>
            <input type="text" id="url-input" placeholder="https://line.me/..." value="">
        </div>

        <!-- ロゴ有無切り替えボタン -->
        <div class="toggle-container">
            <label class="toggle-label active" onclick="updateToggle(this)">
                <input type="radio" name="logoMode" value="with" checked>
                ロゴあり(LINE)
            </label>
            <label class="toggle-label" onclick="updateToggle(this)">
                <input type="radio" name="logoMode" value="without">
                ロゴなし
            </label>
        </div>

        <button id="make-btn" onclick="startProcess()">QRコードを作成</button>
        <div id="status-bar"></div>
        
        <div id="qrcode-display">
            <span style="color:#aaa; font-size:0.9rem;">ここにQRが表示されます</span>
            <img id="qrcode-img" alt="QR Code">
        </div>
        <p style="font-size:0.8rem; color:#888; margin-top:15px;">画像を長押しで保存してください</p>
    </div>

    <div id="temp-canvas" style="display:none;"></div>

        const statusEl = document.getElementById("status-bar");
        const btn = document.getElementById("make-btn");
        
        // 切り替えボタンの見た目制御用
        function updateToggle(label) {
            // 全てのラベルからactiveを外す
            document.querySelectorAll('.toggle-label').forEach(l => l.classList.remove('active'));
            // クリックされたラベルにactiveをつける
            label.classList.add('active');
        }

        function startProcess() {
            const url = document.getElementById("url-input").value;
            // ラジオボタンの選択状態を取得
            const mode = document.querySelector('input[name="logoMode"]:checked').value;

            if (!url) {
                alert("URLを入力してください");
                return;
            }

            statusEl.style.display = "block";
            statusEl.className = "status-ok";
            statusEl.innerText = "処理中...";
            btn.disabled = true;

            if (mode === 'with') {
                // ロゴありの場合：LINEロゴを加工して渡す
                processImage(LINE_LOGO_BASE64, 200, CONFIG.logoRadius, true)
                    .then(roundedLogo => generateQR(url, roundedLogo))
                    .catch(handleError);
            } else {
                // ロゴなしの場合：nullを渡して生成
                generateQR(url, null);
            }
        }

        function handleError(err) {
            console.error(err);
            statusEl.innerText = "エラーが発生しました";
            statusEl.className = "status-error";
            btn.disabled = false;
        }

        function createRoundedPath(ctx, width, height, radius) {
            ctx.beginPath();
            if (radius === 0) {
                ctx.rect(0, 0, width, height);
            } else {
                ctx.moveTo(radius, 0);
                ctx.lineTo(width - radius, 0);
                ctx.arcTo(width, 0, width, radius, radius);
                ctx.lineTo(width, height - radius);
                ctx.arcTo(width, height, width - radius, height, radius);
                ctx.lineTo(radius, height);
                ctx.arcTo(0, height, 0, height - radius, radius);
                ctx.lineTo(0, radius);
                ctx.arcTo(0, 0, radius, 0, radius);
            }
            ctx.closePath();
        }

        function processImage(source, sizeOrCanvas, radius, isLogo) {
            return new Promise((resolve, reject) => {
                let img;
                if (typeof source === 'string') {
                    img = new Image();
                    img.onload = () => draw(img);
                    img.onerror = () => reject("画像エラー");
                    img.src = source;
                } else {
                    img = source;
                    draw(img);
                }

                function draw(imageObj) {
                    try {
                        const canvas = document.createElement('canvas');
                        let targetW, targetH;

                        if (isLogo) {
                            targetW = targetH = sizeOrCanvas;
                        } else {
                            targetW = sizeOrCanvas.width;
                            targetH = sizeOrCanvas.height;
                        }

                        canvas.width = targetW;
                        canvas.height = targetH;
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, targetW, targetH);

                        createRoundedPath(ctx, targetW, targetH, radius);
                        ctx.clip();

                        if (isLogo) {
                            ctx.fillStyle = "#ffffff";
                            ctx.fillRect(0, 0, targetW, targetH);
                        }

                        if (isLogo) {
                            const scale = Math.max(targetW / imageObj.width, targetH / imageObj.height);
                            const drawW = imageObj.width * scale;
                            const drawH = imageObj.height * scale;
                            const offsetX = (targetW - drawW) / 2;
                            const offsetY = (targetH - drawH) / 2;
                            ctx.drawImage(imageObj, offsetX, offsetY, drawW, drawH);
                        } else {
                            ctx.drawImage(imageObj, 0, 0, targetW, targetH);
                        }

                        resolve(canvas.toDataURL("image/png"));
                    } catch (e) {
                        reject(e);
                    }
                }
            });
        }

        function generateQR(url, logoSrc) {
            const tempDiv = document.getElementById("temp-canvas");
            const finalImg = document.getElementById("qrcode-img");
            
            tempDiv.innerHTML = "";
            statusEl.innerText = "QRコードを生成中...";

            const options = {
                text: url,
                width: CONFIG.qrSize,
                height: CONFIG.qrSize,
                quietZone: CONFIG.quietZone,
                quietZoneColor: '#ffffff',
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H,

                // ロゴの設定（logoSrcがnullならロゴなしになる）
                logo: logoSrc,
                logoWidth: logoSrc ? CONFIG.logoSize : undefined,
                logoHeight: logoSrc ? CONFIG.logoSize : undefined,
                logoBackgroundColor: 'transparent',
                logoBackgroundTransparent: true,

                onRenderingEnd: function(opts, dataURL) {
                    setTimeout(function() {
                        const srcCanvas = tempDiv.querySelector("canvas");
                        if(!srcCanvas) return;

                        // QRコード全体の加工（CONFIG.qrRadius=0なので直角）
                        processImage(srcCanvas, srcCanvas, CONFIG.qrRadius, false)
                            .then(finalDataURL => {
                                finalImg.src = finalDataURL;
                                finalImg.style.display = "block";
                                document.querySelector("#qrcode-display span").style.display = "none";
                                statusEl.innerText = "完了！長押しで保存できます";
                                btn.disabled = false;
                            })
                            .catch(handleError);
                    }, 200);
                }
            };

            try {
                new QRCode(tempDiv, options);
            } catch (e) {
                handleError(e);
            }
        }
