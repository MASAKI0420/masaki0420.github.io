// 初期設定：巻数選択ボタンを生成
window.onload = () => {
  const grid = document.getElementById('volume-grid');
  quizData.forEach(data => {
    const btn = document.createElement('button');
    btn.className = 'vol-select-btn';
    btn.textContent = `第${data.volume}巻`;
    btn.onclick = () => showQuiz(data.volume);
    grid.appendChild(btn);
  });

// クイズ画面の表示
function showQuiz(volume) {
  // 画面切り替え
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  window.scrollTo(0, 0);

  const container = document.getElementById('quiz-container');
  container.innerHTML = ''; // 以前のクイズをクリア

  // 選ばれた巻のデータを取得
  const volData = quizData.find(d => d.volume === volume);
  
  const volDiv = document.createElement('div');
  volDiv.className = 'volume-section';
  
  // スコア表示用エリア
  const scoreDiv = document.createElement('div');
  scoreDiv.className = 'score-display';
  scoreDiv.id = 'score-display';
  volDiv.appendChild(scoreDiv);

  const title = document.createElement('h2');
  title.className = 'volume-title';
  title.textContent = `第${volData.volume}巻 クイズ`;
  volDiv.appendChild(title);
  
  // ユーザーの回答状況を保存する配列（nullで初期化）
  let userAnswers = new Array(volData.questions.length).fill(null);
  // DOMを後から操作するための配列
  let questionDOMs = [];

  volData.questions.forEach((qData, qIndex) => {
    const qDiv = document.createElement('div');
    qDiv.className = 'quiz-item';
    
    // 問題文
    const qText = document.createElement('div');
    qText.className = 'quiz-question';
    qText.textContent = `Q${qIndex + 1}. ${qData.q}`;
    qDiv.appendChild(qText);
    
    // 選択肢コンテナ
    const choicesDiv = document.createElement('div');
    choicesDiv.className = 'choices';
    
    // 結果表示エリア
    const resultDiv = document.createElement('div');
    resultDiv.className = 'result';
    
    let choiceBtns = [];
    
    qData.choices.forEach((choice, cIndex) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice;
      
      btn.onclick = () => {
        // すでに採点済みの場合はクリックできないようにする
        const submitBtn = document.getElementById('submit-btn');
        if (submitBtn && submitBtn.disabled) return;

        // 同じ問題内の他の選択肢の選択状態を解除
        choiceBtns.forEach(b => b.classList.remove('selected'));
        // クリックした選択肢を選択状態にする
        btn.classList.add('selected');
        
        // ユーザーの回答を記録
        userAnswers[qIndex] = cIndex;
      };
      
      choiceBtns.push(btn);
      choicesDiv.appendChild(btn);
    });
    
    qDiv.appendChild(choicesDiv);
    qDiv.appendChild(resultDiv);
    volDiv.appendChild(qDiv);
    
    // あとで採点する時のためにDOMと正解データを保存
    questionDOMs.push({ choiceBtns, resultDiv, ans: qData.ans });
  });
  
  // 結果を見る（採点）ボタン
  const submitBtn = document.createElement('button');
  submitBtn.id = 'submit-btn';
  submitBtn.className = 'submit-btn';
  submitBtn.textContent = '結果を見る';
  
  submitBtn.onclick = () => {
    // 全問回答されているかチェック
    if (userAnswers.includes(null)) {
      alert("まだ回答していない問題があります！");
      return;
    }

    // 採点処理
    submitBtn.disabled = true; // ボタンを無効化して二重クリック防止
    submitBtn.textContent = '採点完了';
    
    let score = 0;

    questionDOMs.forEach((doms, idx) => {
      const userAnswer = userAnswers[idx];
      const correctAns = doms.ans;
      
      // ボタンをすべて無効化
      doms.choiceBtns.forEach(b => b.disabled = true);

      // まず正解のボタンを緑色にする
      doms.choiceBtns[correctAns].classList.add('correct');

      // 正誤判定
      if (userAnswer === correctAns) {
        score++;
        doms.resultDiv.textContent = "〇 正解！";
        doms.resultDiv.style.color = "#2e7d32";
      } else {
        // 間違えた場合は、選んだボタンを赤色にする
        doms.choiceBtns[userAnswer].classList.add('wrong');
        doms.resultDiv.textContent = `× 不正解... 正解は「${volData.questions[idx].choices[correctAns]}」`;
        doms.resultDiv.style.color = "#c62828";
      }
    });

    // スコアの表示
    scoreDiv.textContent = `✨ ${volData.questions.length}問中 ${score}問正解！ ✨`;
    scoreDiv.style.display = 'block';

    // 画面の一番上（スコアの部分）へスクロール
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  volDiv.appendChild(submitBtn);
  container.appendChild(volDiv);
}
