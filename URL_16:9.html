    <meta name="theme-color" content="#000000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=overlays-content, viewport-fit=cover">
    
    <!-- アプリ化設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stable Viewer">
    
    <title>Ultimate Stable Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; background-color: #000000; color: white; 
            font-family: sans-serif; overflow: hidden; position: fixed; 
            touch-action: none; 
        }

        #home-screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            width: 100%; height: 100vh; background-color: #202124; z-index: 100; position: absolute; top: 0; left: 0;
            transition: opacity 0.3s;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        #home-screen.hidden { opacity: 0; pointer-events: none; }

        .title { font-size: 28px; font-weight: bold; margin-bottom: 30px; color: #fff; text-align: center;}
        .search-box { width: 90%; max-width: 600px; display: flex; flex-direction: column; align-items: center; }

        #urlInput {
            width: 100%; padding: 18px 25px; font-size: 18px; border-radius: 30px;
            border: 1px solid #5f6368; background: #303134; color: white; outline: none; margin-bottom: 20px;
        }

        .start-btn {
            background: #8ab4f8; color: #202124; padding: 15px 40px; border-radius: 30px;
            border: none; font-weight: bold; cursor: pointer; font-size: 18px;
        }

        #viewer-screen { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000000;
            display: flex; justify-content: center; align-items: center; 
            opacity: 0; z-index: -1; transition: opacity 0.2s;
            pointer-events: auto; 
        }
        #viewer-screen.active { opacity: 1; z-index: 50; }

        .ratio-box { 
            position: relative; background: #000; flex-shrink: 0;
            pointer-events: auto; overflow: hidden;
        }

        /* 画面が固まるのを防ぐため、レンダリング設定を最適化 */
        iframe { 
            width: 100%; height: 100%; border: none; display: block; 
            background: #000; color-scheme: dark;
        }

        #nav-bar {
            position: fixed; 
            top: max(10px, env(safe-area-inset-top)); 
            left: max(10px, env(safe-area-inset-left)); 
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #nav-bar:hover { opacity: 1; pointer-events: auto; }
        .nav-btn {
            background: rgba(0, 0, 0, 0.6); color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px;
        }

        #restore-barrier {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 99999; flex-direction: column;
            justify-content: center; align-items: center; color: white; text-align: center;
            backdrop-filter: blur(8px); cursor: pointer; pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="title">完全固定 Viewer</div>
        <div class="search-box">
            <input type="url" id="urlInput" placeholder="URLを入力" autofocus>
            <button class="start-btn" id="launchBtn">16:9 で開始</button>
        </div>
    </div>

    <div id="viewer-screen">
        <div id="nav-bar">
            <button class="nav-btn" onclick="goHome()">← 戻る</button>
        </div>
        <div id="ratioBox" class="ratio-box">
            <!-- 許可属性を強化 -->
            <iframe id="targetFrame" src="about:blank" allow="autoplay; fullscreen; microphone; camera; midi; encrypted-media; gyroscope; accelerometer; clipboard-write;"></iframe>
        </div>
        <div id="restore-barrier">
            <div style="font-size: 22px; font-weight: bold; margin-bottom: 10px;">タップしてフルスクリーンに復帰</div>
            <div style="font-size: 14px; opacity: 0.7;">(1回タップで元に戻ります)</div>
        </div>
    </div>

    <script>
        const home = document.getElementById('home-screen');
        const viewer = document.getElementById('viewer-screen');
        const input = document.getElementById('urlInput');
        const frame = document.getElementById('targetFrame');
        const ratioBox = document.getElementById('ratioBox');
        const barrier = document.getElementById('restore-barrier');
        const launchBtn = document.getElementById('launchBtn');
        
        let isLocked = false;

        function doFullscreen() {
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        }

        launchBtn.onclick = () => {
            let url = input.value.trim();
            if (!url) return;
            if (!/^https?:\/\//i.test(url)) url = 'http://' + url;

            // 1. まずフルスクリーン化
            doFullscreen();

            // 2. 画面をアクティブにする（真っ暗な箱を先に表示）
            isLocked = true;
            home.classList.add('hidden');
            viewer.classList.add('active');
            
            // 3. 画面サイズを先に確定させる
            lockSize();

            // 4. コンマ数秒待ってからURLを流し込む（描画エンジンが0pxで起動するのを防ぐ）
            setTimeout(() => {
                frame.src = url;
                
                // 強制的に再描画を促す
                setTimeout(() => {
                    frame.focus();
                    try { frame.contentWindow.focus(); } catch(e){}
                }, 500);
            }, 400); 
        };

        barrier.onclick = () => {
            doFullscreen();
            barrier.style.display = 'none';
            // 復帰時に描画が止まる場合があるためフォーカスし直す
            setTimeout(() => { frame.focus(); }, 100);
        };

        function lockSize() {
            let screenW = Math.max(window.innerWidth, window.screen.width, window.screen.height);
            let screenH = Math.min(window.innerHeight, window.screen.width, window.screen.height);
            let boxW, boxH;

            if (screenW / screenH > 16 / 9) {
                boxH = screenH; boxW = screenH * 16 / 9;
            } else {
                boxW = screenW; boxH = screenW * 9 / 16;
            }
            ratioBox.style.width = Math.floor(boxW) + 'px';
            ratioBox.style.height = Math.floor(boxH) + 'px';
        }

        const handleFSChange = () => {
            if (isLocked && !document.fullscreenElement && !document.webkitFullscreenElement) {
                barrier.style.display = 'flex';
            }
        };
        document.addEventListener('fullscreenchange', handleFSChange);
        document.addEventListener('webkitfullscreenchange', handleFSChange);

        function goHome() {
            isLocked = false;
            if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen().catch(()=>{});
            frame.src = "about:blank";
            viewer.classList.remove('active');
            home.classList.remove('hidden');
            barrier.style.display = 'none';
        }

        window.addEventListener('resize', () => { if(isLocked) lockSize(); });
    </script>
</body>
</html>
